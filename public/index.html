<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Espacios Culturales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Registrar Nuevo Espacio Cultural</h2>
    
    <form id="formEspacio">
        <div class="mb-3">
            <label>Nombre del Espacio</label>
            <input type="text" id="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Capacidad Máxima (Aforo)</label>
            <input type="number" id="capacity" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Estado</label>
            <select id="state" class="form-control">
                <option value="Operativo">Operativo</option>
                <option value="En Mantenimiento">En Mantenimiento</option>
            </select>
        </div>
        <div class="mb-3">
            <label>Dependencia</label>
            <input type="text" id="dependency" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Registrar Espacio</button>
    </form>

    <script>
        // Lógica de frontend para enviar los datos a tu ruta Node.js
        document.getElementById('formEspacio').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página recargue

            const datos = {
                name: document.getElementById('name').value,
                maximum_capacity: document.getElementById('capacity').value,
                state: document.getElementById('state').value,
                dependency: document.getElementById('dependency').value
            };

            try {
                // Aquí llamamos a la ruta que configuraste en city.routes.js
                const response = await fetch('/api/cities/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                const result = await response.json();
                
                if(response.ok) {
                    alert('¡Registrado con éxito!');
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                console.error('Error de conexión:', error);
            }
        });
    </script>
</body>
</html>
